<!DOCTYPE html>
<html>
<head>
    <title>All Input Types Form</title>
</head>
<body>

<h1>Registration Form</h1>
<form action="action.php">
    Name:
    <input type="text" name="name"><br><br>

    Password:
    <input type="password" name="password"><br><br>

    Email:
    <input type="email" name="email"><br><br>

    Age:
    <input type="number" name="age"><br><br>

    Website:
    <input type="url" name="website"><br><br>

    Search:
    <input type="search" name="search"><br><br>

    Date of Birth:
    <input type="date" name="dob"><br><br>

    Time:
    <input type="time" name="time"><br><br>

    Favorite Color:
    <input type="color" name="color"><br><br>

    Stress Level:
    <input type="range" name="range" min="0" max="10"><br><br>

    Hobbies:
    <input type="checkbox" name="hobby" value="Reading"> Reading
    <input type="checkbox" name="hobby" value="Sports"> Sports<br><br>

    Gender:
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female<br><br>

    Upload Resume:
    <input type="file" name="file"><br><br>

    Image Submit:
    <input type="image" src="https://upload.wikimedia.org/wikipedia/en/a/a6/Pok%C3%A9mon_Pikachu_art.png" alt="Submit"><br><br>

    <input type="submit" value="Submit">

    <input type="reset" value="Reset">

    <input type="button" value="Click Me">

</form>

</body>
</html>
