<!DOCTYPE html>
<html>

<head>
    <title>Open New Window</title>
    <script>
        function openNewWindow() {
            window.open(
                "https://www.google.com",
                "_blank",
                "width=600,height=400"
            );
        }
    </script>
</head>

<body>

    <h2>Open New Window Example</h2>

    <button onclick="openNewWindow()">Open Google</button>

</body>

</html>
