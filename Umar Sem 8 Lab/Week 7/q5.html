<!DOCTYPE html>
<html>
<head>
    <title>Image Switch on Hover</title>
</head>
<body>
    <h2>Hover over the image to see it change</h2>

    <img 
        src="image1.jpg" 
        alt="Image 1" 
        id="myImage" 
        width="300"
        onmouseover="this.src='image2.jpg';" 
        onmouseout="this.src='image1.jpg';"
    >
</body>
</html>
